name: Deploy to GCP

on:
  push:
    branches: [ main ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-northeast3
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push container image
        run: |
          gcloud builds submit --tag gcr.io/${{ env.PROJECT_ID }}/news-backend ./backend

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy news-backend \
            --image gcr.io/${{ env.PROJECT_ID }}/news-backend \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --set-env-vars GEMINI_API_KEY=${{ env.GEMINI_API_KEY }}

  deploy-summarizer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy summarize_news Cloud Function
        run: |
          gcloud functions deploy summarize_news \
            --gen2 \
            --runtime python311 \
            --trigger-topic worker-news-summary \
            --entry-point summarize_news \
            --source ./news_summarizer \
            --region ${{ env.REGION }} \
            --set-env-vars GEMINI_API_KEY=${{ env.GEMINI_API_KEY }}

  deploy-trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy trigger_news_summary Cloud Function
        run: |
          gcloud functions deploy trigger_news_summary \
            --gen2 \
            --runtime python311 \
            --entry-point trigger_news_summary \
            --source ./trigger_function \
            --region ${{ env.REGION }} \
            --trigger-http \
            --allow-unauthenticated
